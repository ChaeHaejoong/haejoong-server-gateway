services:
  haejoong-server-gateway:
    image: nginx:1.29.8-alpine
    container_name: haejoong-server-gateway
    restart: always
    environment:
      - TZ=Asia/Seoul
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - haejoong.com-network

networks:
  haejoong.com-network:
    external: true

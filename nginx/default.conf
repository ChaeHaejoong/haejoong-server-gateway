log_format haejoong_server_gateway_log
    '$http_x_forwarded_for - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'host="$host" '
    'rt=$request_time '
    'urt="$upstream_response_time"';

# 해중.com
server {
    listen 3000;
    server_name 
        xn--955bn0u.com
        *.xn--955bn0u.com
        localhost
        127.0.0.1;
    
    server_tokens off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    access_log /var/log/nginx/access.log haejoong_server_gateway_log;
    error_log /var/log/nginx/error.log warn;

    location /api/v1 {
        # go 서버
        proxy_pass http://haejoong.com-api-go:8080;
    }

    location / {
        # NestJS 서버
        proxy_pass http://haejoong.com-api:3000;
    }
}